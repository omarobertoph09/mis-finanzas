<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ebebea;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #999;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --radius: 8px; --radius-lg: 12px;
    --green: #1D9E75; --red: #D85A30; --blue: #3266ad; --amber: #BA7517;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e; --bg2: #2a2a2a; --bg3: #333;
      --text: #f0f0f0; --text2: #aaa; --text3: #777;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.2);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  #app { max-width: 720px; margin: 0 auto; background: var(--bg); min-height: 100vh; padding: 0; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-right { display: flex; gap: 8px; }
  .nav { display: flex; gap: 0; overflow-x: auto; border-bottom: 0.5px solid var(--border); background: var(--bg); position: sticky; top: 57px; z-index: 9; }
  .nav-btn { flex: 1; min-width: 60px; padding: 10px 6px; font-size: 11px; font-weight: 500; background: none; border: none; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .nav-btn i { font-size: 18px; }
  .nav-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
  .content { padding: 16px; }
  .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  @media(min-width:500px){ .metric-grid { grid-template-columns: repeat(4,1fr); } }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
  .metric-value { font-size: 20px; font-weight: 600; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 14px; }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; }
  .row2 { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media(min-width:500px){ .row2 { grid-template-columns: 1fr 1fr; } }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
  input, select { font-size: 14px; padding: 9px 11px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); width: 100%; outline: none; }
  input:focus, select:focus { border-color: var(--blue); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .btn:hover { background: var(--bg3); }
  .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-primary:hover { background: #185FA5; }
  .btn-success { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-success:hover { background: #0F6E56; }
  .btn-danger { background: var(--red); color: #fff; border-color: var(--red); padding: 6px 10px; font-size: 12px; }
  .btn-sm { padding: 6px 11px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }
  .tx-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg2); border-radius: var(--radius); margin-bottom: 6px; font-size: 13px; }
  .tx-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-date { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .tx-amount { font-weight: 600; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .badge-green { background: #EAF3DE; color: #3B6D11; }
  .badge-red { background: #FCEBEB; color: #A32D2D; }
  .badge-blue { background: #E6F1FB; color: #185FA5; }
  .green { color: var(--green); } .red { color: var(--red); } .blue { color: var(--blue); } .amber { color: var(--amber); }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .empty-state { text-align: center; padding: 2rem; color: var(--text3); font-size: 13px; }
  .progress-bar { height: 8px; background: var(--bg3); border-radius: 99px; overflow: hidden; margin: 6px 0 4px; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width .4s; }
  .tip-card { border-left: 3px solid var(--blue); border-radius: 0 var(--radius) var(--radius) 0; padding: 12px 14px; margin-bottom: 10px; font-size: 13px; background: var(--bg2); }
  .tip-title { font-weight: 600; margin-bottom: 4px; }
  .tip-desc { color: var(--text2); line-height: 1.5; }
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 8px; }
  .alert-warn { background: #FAEEDA; color: #854F0B; }
  .alert-ok { background: #EAF3DE; color: #3B6D11; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .chart-wrap { position: relative; width: 100%; }
  .user-avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
  /* LOGIN */
  .login-wrap { max-width: 360px; margin: 2rem auto; padding: 0 16px; }
  .login-logo { text-align: center; margin-bottom: 2rem; }
  .login-logo .logo-icon { font-size: 48px; margin-bottom: 10px; }
  .login-logo h1 { font-size: 24px; font-weight: 700; }
  .login-logo p { font-size: 14px; color: var(--text2); margin-top: 4px; }
  .user-list-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--bg2); border-radius: var(--radius-lg); margin-bottom: 10px; cursor: pointer; border: 0.5px solid var(--border); }
  .user-list-item:hover { background: var(--bg3); }
  .pin-dots { display: flex; gap: 12px; justify-content: center; margin: 1.5rem 0 0.5rem; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; background: var(--bg3); border: 1.5px solid var(--border2); transition: background .15s; }
  .pin-dot.filled { background: var(--blue); border-color: var(--blue); }
  .pin-pad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; max-width: 220px; margin: 1rem auto 0; }
  .pin-key { padding: 16px; font-size: 20px; font-weight: 500; border: 0.5px solid var(--border); border-radius: var(--radius-lg); background: var(--bg2); color: var(--text); cursor: pointer; text-align: center; }
  .pin-key:hover { background: var(--bg3); }
  .pin-key:active { transform: scale(0.96); }
  .fixed-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--bg2); border-radius: var(--radius); margin-bottom: 6px; font-size: 13px; }
  .goal-item { background: var(--bg2); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
  .goal-header { display: flex; justify-content: space-between; align-items: center; }
  /* TABS en móvil */
  @media(max-width:400px){ .form-row { grid-template-columns: 1fr; } }
  /* Iconos de font awesome como fallback */
  .icon { font-style: normal; font-size: 18px; }
</style>

<body>
<div id="app"></div>

<script>
// ── 2. CONFIGURACIÓN E INICIALIZACIÓN DE FIREBASE ─────────
// ¡PEGA AQUÍ TU PROPIO OBJETO DE CONFIGURACIÓN DE FIREBASE!
const firebaseConfig = {
apiKey: "AIzaSyDMzcUQ_Jfnt7KMii1hltCSbsYkVwFg8fA",
  authDomain: "organiza-tus-finanzas.firebaseapp.com",
  databaseURL: "https://organiza-tus-finanzas-default-rtdb.firebaseio.com",
  projectId: "organiza-tus-finanzas",
  storageBucket: "organiza-tus-finanzas.firebasestorage.app",
  messagingSenderId: "116141411805",
  appId: "1:116141411805:web:000f2fbf28ad4fe7adba34",
  measurementId: "G-9SZKJMKQPQ"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── Variables Globales del Estado de la App ──────────────
const CAT_COLORS={
  'Alimentación':'#1D9E75','Transporte':'#378ADD','Vivienda':'#BA7517',
  'Salud':'#D4537E','Entretenimiento':'#7F77DD','Ropa':'#D85A30',
  'Educación':'#639922','Servicios':'#888780','Ahorro':'#0F6E56',
  'Sueldo':'#185FA5','Negocio':'#533AB7','Extra':'#EF9F27','Otro':'#73726c'
};
const CAT_ICONS={
  'Alimentación':'🛒','Transporte':'🚗','Vivienda':'🏠','Salud':'❤️',
  'Entretenimiento':'🎬','Ropa':'👕','Educación':'📚','Servicios':'💡',
  'Ahorro':'🐷','Sueldo':'💼','Negocio':'📈','Extra':'✨','Otro':'📦'
};
const AVATAR_COLORS=['#3266ad','#1D9E75','#D85A30','#7F77DD','#D4537E','#BA7517','#639922'];

let globalUsers = []; // Lista local de usuarios sincronizada con Firebase
let currentUser = null;
let activePage = 'dashboard';
let pinBuffer = '';
let charts = {};

// ── 3. NUEVA LOGICA DE ALMACENAMIENTO EN TIEMPO REAL ──────
function defaultData(){ return {transacciones:[],ahorros:[],metas:[],fijos:[],nextId:1}; }

// Sincronizar cambios en Firebase hacia nuestra interfaz en tiempo real
db.ref('users').on('value', snapshot => {
  const data = snapshot.val();
  globalUsers = data ? Object.values(data) : [];
  
  // Si hay un usuario logueado, mantener actualizados sus datos en memoria viva
  if(currentUser) {
    const updatedUser = globalUsers.find(u => u.id === currentUser.id);
    if(updatedUser) {
      // Asegurar que las estructuras de arreglos existan si la nube las limpia por vacías
      if(!updatedUser.data) updatedUser.data = defaultData();
      if(!updatedUser.data.transacciones) updatedUser.data.transacciones = [];
      if(!updatedUser.data.ahorros) updatedUser.data.ahorros = [];
      if(!updatedUser.data.metas) updatedUser.data.metas = [];
      if(!updatedUser.data.fijos) updatedUser.data.fijos = [];
      
      currentUser = updatedUser;
    }
  }
  // Re-renderizar la pantalla activa automáticamente en cualquier cambio
  render();
});

function save(){ 
  if(currentUser) {
    db.ref('users/' + currentUser.id).set(currentUser);
  } 
}

// ── Utils ─────────────────────────────────────────────────
function fmt(n){ return '$'+Math.round(parseFloat(n)||0).toLocaleString('es-MX'); }
function initials(name){ return name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function today(){ return new Date().toISOString().split('T')[0]; }
function destroyCharts(){ Object.values(charts).forEach(c=>c&&c.destroy()); charts={}; }
function calcStats(d){
  const gastos=d.transacciones.filter(t=>t.tipo==='gasto');
  const ingresos=d.transacciones.filter(t=>t.tipo==='ingreso');
  const totalGasto=gastos.reduce((a,b)=>a+b.monto,0);
  const totalIngreso=ingresos.reduce((a,b)=>a+b.monto,0);
  const totalAhorro=d.ahorros.reduce((a,b)=>a+b.monto,0);
  return{gastos,ingresos,totalGasto,totalIngreso,totalAhorro,balance:totalIngreso-totalGasto};
}

// ── Render root ───────────────────────────────────────────
function render(){
  if(!currentUser){ renderLogin(); return; }
  renderApp();
}

// ── LOGIN ─────────────────────────────────────────────────
function renderLogin(){
  document.getElementById('app').innerHTML = `
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-icon">💰</div>
      <h1>Mis Finanzas</h1>
      <p>Controla tu dinero, construye tu futuro</p>
    </div>
    ${globalUsers.length ? `
    <div style="margin-bottom:1.5rem">
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Selecciona tu usuario</p>
      ${globalUsers.map(u=>`
        <div class="user-list-item" onclick="selectUser('${u.id}')">
          <div class="user-avatar" style="width:44px;height:44px;font-size:16px;background:${u.color}22;color:${u.color}">${initials(u.name)}</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:15px">${u.name}</div>
            <div style="font-size:12px;color:var(--text3)">Toca para entrar con PIN</div>
          </div>
          <i class="ti ti-chevron-right" style="color:var(--text3)"></i>
        </div>
      `).join('')}
    </div>` : `<div class="empty-state" style="margin-bottom:1.5rem">👋 Bienvenido. Crea tu primer usuario abajo.</div>`}
    <div class="card">
      <div class="card-title">Crear nuevo usuario</div>
      <div class="form-group"><label>Nombre</label><input type="text" id="newName" placeholder="Tu nombre" autocomplete="off"></div>
      <div class="form-group"><label>PIN de 4 dígitos</label><input type="password" id="newPin" placeholder="****" maxlength="4" inputmode="numeric"></div>
      <button class="btn btn-primary btn-full" onclick="createUser()"><i class="ti ti-user-plus"></i> Crear usuario</button>
    </div>
  </div>`;
}

function selectUser(uid){
  const u = globalUsers.find(x=>x.id===uid);
  if(!u) return;
  pinBuffer = '';
  document.getElementById('app').innerHTML = `
  <div class="login-wrap">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div class="user-avatar" style="width:64px;height:64px;font-size:22px;background:${u.color}22;color:${u.color};margin:0 auto 12px">${initials(u.name)}</div>
      <div style="font-size:18px;font-weight:700">${u.name}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:4px">Ingresa tu PIN de 4 dígitos</div>
    </div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div id="pinError" style="text-align:center;font-size:13px;color:var(--red);min-height:20px;margin:8px 0"></div>
    <div class="pin-pad">
      ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`<div class="pin-key" onclick="pinKey('${k}','${uid}')">${k}</div>`).join('')}
    </div>
    <div style="text-align:center;margin-top:1.5rem">
      <button class="btn btn-sm" onclick="renderLogin()"><i class="ti ti-arrow-left"></i> Volver</button>
    </div>
  </div>`;
}

function pinKey(k, uid){
  if(k==='') return;
  if(k==='⌫'){ pinBuffer=pinBuffer.slice(0,-1); }
  else if(pinBuffer.length<4){ pinBuffer+=k; }
  for(let i=0;i<4;i++){
    const d=document.getElementById('d'+i);
    if(d) d.className='pin-dot'+(i<pinBuffer.length?' filled':'');
  }
  if(pinBuffer.length===4) setTimeout(()=>checkPin(uid),100);
}

function checkPin(uid){
  const u = globalUsers.find(x=>x.id===uid);
  if(u && u.pin===pinBuffer){
    currentUser = u;
    activePage = 'dashboard';
    renderApp();
  } else {
    const e = document.getElementById('pinError');
    if(e) e.textContent = 'PIN incorrecto. Intenta de nuevo.';
    pinBuffer = '';
    for(let i=0;i<4;i++){ const d=document.getElementById('d'+i); if(d) d.className='pin-dot'; }
  }
}

function createUser(){
  const name = (document.getElementById('newName').value||'').trim();
  const pin = (document.getElementById('newPin').value||'').trim();
  if(!name){ alert('Escribe un nombre.'); return; }
  if(!/^\d{4}$/.test(pin)){ alert('El PIN debe ser exactamente 4 dígitos numéricos.'); return; }
  if(globalUsers.find(u=>u.name.toLowerCase()===name.toLowerCase())){ alert('Ya existe un usuario con ese nombre.'); return; }
  
  const uid = 'u'+Date.now();
  const color = AVATAR_COLORS[globalUsers.length % AVATAR_COLORS.length];
  const newUser = {id:uid, name, pin, color, data:defaultData()};
  
  // Guardar directo en la ruta del ID del usuario
  db.ref('users/' + uid).set(newUser, (error) => {
    if(!error) {
      currentUser = newUser;
      activePage = 'dashboard';
      renderApp();
    }
  });
}

function logout(){ currentUser=null; activePage='dashboard'; destroyCharts(); render(); }

// ── APP SHELL ─────────────────────────────────────────────
function renderApp(){
  const u = currentUser;
  document.getElementById('app').innerHTML = `
  <div class="topbar">
    <div class="topbar-left">
      <div class="user-avatar" style="width:36px;height:36px;font-size:13px;background:${u.color}22;color:${u.color}">${initials(u.name)}</div>
      <div>
        <div style="font-weight:600;font-size:14px;line-height:1">${u.name}</div>
        <div style="font-size:11px;color:var(--text3)">Mis Finanzas</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-sm" onclick="exportExcel()"><i class="ti ti-file-spreadsheet"></i> Excel</button>
      <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> Salir</button>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn" id="nb-dashboard" onclick="showPage('dashboard')"><i class="ti ti-dashboard"></i><span>Inicio</span></button>
    <button class="nav-btn" id="nb-transacciones" onclick="showPage('transacciones')"><i class="ti ti-arrows-exchange"></i><span>Movimientos</span></button>
    <button class="nav-btn" id="nb-ahorros" onclick="showPage('ahorros')"><i class="ti ti-piggy-bank"></i><span>Ahorros</span></button>
    <button class="nav-btn" id="nb-fijos" onclick="showPage('fijos')"><i class="ti ti-repeat"></i><span>Fijos</span></button>
    <button class="nav-btn" id="nb-rec" onclick="showPage('rec')"><i class="ti ti-bulb"></i><span>Consejos</span></button>
  </div>
  <div class="content" id="pageContent"></div>`;
  showPage(activePage);
}

function showPage(p){
  activePage = p;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('nb-'+p);
  if(nb) nb.classList.add('active');
  destroyCharts();
  const c = document.getElementById('pageContent');
  if(!c) return;
  if(p==='dashboard') renderDashboard(c);
  else if(p==='transacciones') renderTxPage(c);
  else if(p==='ahorros') renderAhorrosPage(c);
  else if(p==='fijos') renderFijosPage(c);
  else if(p==='rec') renderRecPage(c);
}

// ── DASHBOARD ─────────────────────────────────────────────
function renderDashboard(c){
  const d = currentUser.data;
  const{totalGasto,totalIngreso,totalAhorro,balance} = calcStats(d);
  const pctAhorro = totalIngreso>0 ? Math.round((totalAhorro/totalIngreso)*100) : 0;

  const catMap={};
  d.transacciones.filter(t=>t.tipo==='gasto').forEach(t=>{ catMap[t.cat]=(catMap[t.cat]||0)+t.monto; });
  const cats=Object.keys(catMap), vals=cats.map(c=>catMap[c]), colors=cats.map(c=>CAT_COLORS[c]||'#888');

  const monthMap={};
  d.transacciones.forEach(t=>{
    const m=t.fecha.slice(0,7);
    if(!monthMap[m]) monthMap[m]={ing:0,gas:0};
    if(t.tipo==='ingreso') monthMap[m].ing+=t.monto; else monthMap[m].gas+=t.monto;
  });
  const mKeys=Object.keys(monthMap).sort().slice(-6);
  const mLabels=mKeys.map(k=>{ const[y,mo]=k.split('-'); return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(mo)-1]+' '+y.slice(2); });

  const txsSorted=[...d.transacciones].sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  let acum=0; const fL=[],fD=[];
  txsSorted.forEach(t=>{ acum+=t.tipo==='ingreso'?t.monto:-t.monto; fL.push(t.fecha.slice(5)); fD.push(Math.round(acum)); });

  const alerts=[];
  if(totalIngreso===0) alerts.push({cls:'alert-warn',msg:'📝 Registra tus ingresos para ver tu balance real.'});
  else if(balance<0) alerts.push({cls:'alert-warn',msg:'⚠️ Tus gastos superan tus ingresos este período.'});

function renderRecPage(c){

  else if(pctAhorro>=20) tips.push({color:'#1D9E75',icon:'🏆',title:`Excelente: ${pctAhorro}% de ahorro`,desc:'Estás ahorrando más del 20% de tus ingresos. ¡Sigue así!'});

  }

  if(!d.metas.length) tips.push({color:'#3266ad',icon:'🎯',title:'Sin metas de ahorro',desc:'Crear metas concretas te mantiene enfocado. Ve a Ahorros y crea tu primera meta hoy.'});
  if(d.transacciones.length===0) tips.push({color:'#3266ad',icon:'💡',title:'Empieza registrando',desc:'Agrega tus movimientos del mes actual para empezar a ver tus patrones de gasto.'});

  const nec=Math.round(totalIngreso*0.5), des=Math.round(totalIngreso*0.3), aho=Math.round(totalIngreso*0.2);
  const rNec=Math.round((catMap['Vivienda']||0)+(catMap['Alimentación']||0)+(catMap['Transporte']||0)+(catMap['Salud']||0)+(catMap['Servicios']||0)+(catMap['Educación']||0));
  const rDes=Math.round((catMap['Entretenimiento']||0)+(catMap['Ropa']||0)+(catMap['Otro']||0)+(catMap['Extra']||0));

  c.innerHTML=`
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">% gastado</div><div class="metric-value ${pctGasto>80?'red':'amber'}">${pctGasto}%</div><div class="metric-sub">de ingresos</div></div>
    <div class="metric"><div class="metric-label">% ahorrado</div><div class="metric-value ${pctAhorro>=20?'green':pctAhorro>=10?'amber':'red'}">${pctAhorro}%</div><div class="metric-sub">de ingresos</div></div>
    <div class="metric"><div class="metric-label">% fijos</div><div class="metric-value ${pctFijos>50?'red':'blue'}">${pctFijos}%</div><div class="metric-sub">de ingresos</div></div>
  </div>
  <div class="card">
    <div class="card-title">Recomendaciones personalizadas</div>
    ${tips.map(t=>`
      <div class="tip-card" style="border-left-color:${t.color}">
        <div class="tip-title" style="color:${t.color}">${t.icon} ${t.title}</div>
        <div class="tip-desc">${t.desc}</div>
      </div>`).join('')}

  <div class="card">
    <div class="card-title">Regla 50 / 30 / 20</div>
    <div class="legend">
      <span><span class="legend-dot" style="background:#1D9E75"></span>Necesidades 50% (ideal ${fmt(nec)})</span>

    <div class="chart-wrap" style="height:190px"><canvas id="chartRegla"></canvas></div>
  </div>`;

  charts['chartRegla']=new Chart(document.getElementById('chartRegla'),{
    type:'bar',
    data:{
      labels:['Necesidades','Deseos','Ahorro'],
      datasets:[
        {label:'Ideal',data:[nec,des,aho],backgroundColor:['#1D9E7544','#3266ad44','#BA751744']},
        {label:'Real',data:[rNec,rDes,Math.round(totalAhorro)],backgroundColor:['#1D9E75','#3266ad','#BA7517']}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:11}}}},scales:{y:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k',font:{size:10}}},x:{ticks:{font:{size:11}}}}}
  });
}

// ── EXPORTAR EXCEL ────────────────────────────────────────
function exportExcel(){
  if(!currentUser){ alert('Inicia sesión primero.'); return; }
  const d = currentUser.data;
  const wb = XLSX.utils.book_new();

  const txData=[['Fecha','Tipo','Categoría','Descripción','Monto ($)'],
    ...d.transacciones.map(t=>[t.fecha,t.tipo,t.cat,t.desc||'',t.monto])];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(txData), 'Movimientos');

  const savData=[['Fecha','Nota','Monto ($)'],
    ...d.ahorros.map(s=>[s.fecha,s.nota||'',s.monto])];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(savData), 'Ahorros');

  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
    ['Nombre','Meta ($)','Fecha límite'],
    ...d.metas.map(m=>[m.nombre,m.total,m.fecha])
  ]), 'Metas');

  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
    ['Nombre','Categoría','Monto ($)','Día de pago'],
    ...d.fijos.map(f=>[f.nombre,f.cat,f.monto,f.dia])
  ]), 'Gastos fijos');

  const{totalGasto,totalIngreso,totalAhorro,balance}=calcStats(d);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
    ['Concepto','Valor ($)'],
    ['Total ingresos',totalIngreso],['Total gastos',totalGasto],
    ['Balance',balance],['Total ahorrado',totalAhorro],
    ['Tasa de ahorro %', totalIngreso>0?Math.round((totalAhorro/totalIngreso)*100):0]
  ]), 'Resumen');

  const fecha=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `Finanzas_${currentUser.name.replace(/\s/g,'_')}_${fecha}.xlsx`);
}
</script>
